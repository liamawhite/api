// +cue-gen:LuaPlugin:annotations:helm.sh/resource-policy=keep
// +cue-gen:LuaPlugin:labels:app=istio-pilot,chart=istio,heritage=Tiller,release=istio
// +cue-gen:LuaPlugin:subresource:status
// +cue-gen:LuaPlugin:spec:required
// +cue-gen:LuaPlugin:scope:Namespaced
// +cue-gen:LuaPlugin:releaseChannel:extended
// +cue-gen:LuaPlugin:resource:categories=istio-io,extensions-istio-io
// +cue-gen:LuaPlugin:printerColumn:name=Age,type=date,JSONPath=.metadata.creationTimestamp,description="CreationTimestamp is a timestamp
// representing the server time when this object was created. It is not guaranteed to be set in happens-before order across separate operations.
// Clients may not set this value. It is represented in RFC3339 form and is in UTC.
// Populated by the system. Read-only. Null for lists. More info: https://git.k8s.io/community/contributors/devel/api-conventions.md#metadata"
// -->
//
// <!-- go code generation tags
// +kubetype-gen
// +kubetype-gen:groupVersion=extensions.istio.io/v1alpha1
// +genclient
// +k8s:deepcopy-gen=true
// -->
// +kubebuilder:validation:XValidation:message="only one of targetRefs or selector can be set",rule="oneof(self.selector, self.targetRef, self.targetRefs)"
message LuaPlugin {
  // Criteria used to select the specific set of pods/VMs on which
  // this plugin configuration should be applied. If omitted, this
  // configuration will be applied to all workload instances in the same
  // namespace. If the `LuaPlugin` is present in the config root
  // namespace, it will be applied to all applicable workloads in any
  // namespace.
  //
  // At most, only one of `selector` or `targetRefs` can be set for a given policy.
  istio.type.v1beta1.WorkloadSelector selector = 1;

  // $hide_from_docs
  istio.type.v1beta1.PolicyTargetReference targetRef = 2;

  // Optional. The targetRefs specifies a list of resources the policy should be
  // applied to. The targeted resources specified will determine which workloads
  // the policy applies to.
  //
  // Currently, the following resource attachment types are supported:
  // * `kind: Gateway` with `group: gateway.networking.k8s.io` in the same namespace.
  // * `kind: GatewayClass` with `group: gateway.networking.k8s.io` in the root namespace.
  // * `kind: Service` with `group: ""` or `group: "core"` in the same namespace. This type is only supported for waypoints.
  // * `kind: ServiceEntry` with `group: networking.istio.io` in the same namespace.
  //
  // If not set, the policy is applied as defined by the selector.
  // At most one of the selector and targetRefs can be set.
  //
  // NOTE: If you are using the `targetRefs` field in a multi-revision environment with Istio versions prior to 1.22,
  // it is highly recommended that you pin the policy to a revision running 1.22+ via the `istio.io/rev` label.
  // This is to prevent proxies connected to older control planes (that don't know about the `targetRefs` field)
  // from misinterpreting the policy as namespace-wide during the upgrade process.
  //
  // NOTE: Waypoint proxies are required to use this field for policies to apply; `selector` policies will be ignored.
  // +kubebuilder:validation:MaxItems=16
  repeated istio.type.v1beta1.PolicyTargetReference targetRefs = 3;

  // Determines where in the filter chain this `LuaPlugin` is to be injected.
  PluginPhase phase = 4;

  // Determines ordering of `LuaPlugins` in the same `phase`.
  // When multiple `LuaPlugins` are applied to the same workload in the
  // same `phase`, they will be applied by priority, in descending order.
  // If `priority` is not set, or two `LuaPlugins` exist with the same
  // value, the ordering will be deterministically derived from name and
  // namespace of the `LuaPlugins`. Defaults to `0`.
  google.protobuf.Int32Value priority = 5;

  // Specifies the criteria to determine which traffic is passed to LuaPlugin.
  // If a traffic satisfies any of TrafficSelectors,
  // the traffic passes the LuaPlugin.
  repeated TrafficSelector match = 6;

  // The inline Lua script that will be executed by the Envoy Lua filter.
  // This script should implement the required Envoy Lua filter callbacks
  // such as envoy_on_request() and envoy_on_response().
  //
  // The script has access to the standard Envoy Lua APIs for header manipulation,
  // request/response body access, and other proxy operations.
  // +kubebuilder:validation:MinLength=1
  string inlineCode = 7 [(google.api.field_behavior) = REQUIRED];
}
