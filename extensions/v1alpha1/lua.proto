syntax = "proto3";

// $schema: istio.extensions.v1alpha1.LuaPlugin
// $title: Lua Plugin
// $description: Extend the functionality provided by the Istio proxy through Lua scripts.
// $location: https://istio.io/docs/reference/config/proxy_extensions/lua-plugin.html
// $aliases: [/docs/reference/config/extensions/v1alpha1/lua-plugin]

// LuaPlugins provides a mechanism to extend the functionality provided by
// the Istio proxy through Lua scripts.
//
// The order of execution (as part of Envoy's filter chain) is determined by
// phase and priority settings, allowing the configuration of complex
// interactions between user-supplied LuaPlugins and Istio's internal
// filters.
//
// Examples:
//
// Basic Lua filter for request header manipulation:
//
// ```yaml
// apiVersion: extensions.istio.io/v1alpha1
// kind: LuaPlugin
// metadata:
//   name: header-modifier
//   namespace: istio-system
// spec:
//   selector:
//     matchLabels:
//       istio: ingressgateway
//   phase: AUTHN
//   inlineCode: |
//     function envoy_on_request(request_handle)
//       request_handle:headers():add("x-custom-header", "added-by-lua")
//     end
// ```
//
// More complex example with priority and traffic matching:
//
// ```yaml
// apiVersion: extensions.istio.io/v1alpha1
// kind: LuaPlugin
// metadata:
//   name: conditional-header-modifier
//   namespace: istio-ingress
// spec:
//   selector:
//     matchLabels:
//       istio: ingressgateway
//   match:
//   - mode: CLIENT
//     ports:
//     - number: 8080
//     - number: 8081
//   phase: AUTHN
//   priority: 1000
//   inlineCode: |
//     function envoy_on_request(request_handle)
//       local domain = "foo.com"
//       local headers = request_handle:headers()
//       local host = headers:get(":authority")
//       local existing_auth_header = headers:get("Authorization")
//       if (domain ~= nil and host ~= nil and existing_auth_header == nil and domain == host) then
//         bearer_token = headers:get("cookie"):match("foo")
//         if (bearer_token ~= nil) then
//           headers:add("Authorization", "Bearer " .. bearer_token)
//         end
//       end
//     end
// ```
//

package istio.extensions.v1alpha1;

import "extensions/v1alpha1/wasm.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/wrappers.proto";
import "type/v1beta1/selector.proto";

option go_package = "istio.io/api/extensions/v1alpha1";

// LuaPlugin provides a mechanism to extend the functionality provided by
// the Istio proxy through Lua scripts.
//
// <!-- crd generation tags
// +cue-gen:LuaPlugin:groupName:extensions.istio.io
